<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline | Expense Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      font-family: Inter, Poppins, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .card {
      width: min(520px, 100%);
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.55rem;
      font-size: clamp(1.3rem, 4vw, 1.7rem);
    }
    p {
      margin: 0;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>Expense Tracker could not reach the internet. Please reconnect and refresh.</p>
  </main>
</body>
</html>
